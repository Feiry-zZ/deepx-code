name: release

# 触发条件:推一个 vX.Y.Z 形式的 tag。
#
# 标准发布流程:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# 推完 tag 后,本 workflow 自动:
#   1. checkout
#   2. 装 Go 1.25
#   3. 跑 goreleaser:5 平台 cross-compile + 打 tar.gz/zip + 生成 changelog + 发 GitHub Release
#
# 不需要任何额外 secret,GITHUB_TOKEN 由 Actions 自动注入。
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # 发 Release 需要

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # goreleaser 算 changelog 需要完整 git 历史
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 把 goreleaser 在 dist/ 里产出的同一批二进制,镜像发布到 Gitee 发行版,
      # 让国内用户能用 SOURCE=gitee 的 install.sh 加速安装/升级。
      # 只构建一次(上面 goreleaser),这里纯分发。token 见 GitHub Secret: GITHUB2GITEE_DEEPX_TOKEN。
      # 失败不阻断 GitHub 发布(continue-on-error)。Gitee 附件 API 若有变,改下面的 curl 即可。
      - name: Mirror release to Gitee
        continue-on-error: true
        env:
          GITEE_TOKEN: ${{ secrets.GITHUB2GITEE_DEEPX_TOKEN }}
          GITEE_OWNER: itmisx
          GITEE_REPO: deepx-code
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          if [ -z "$GITEE_TOKEN" ]; then
            echo "未配置 GITHUB2GITEE_DEEPX_TOKEN,跳过 Gitee 发布"; exit 0
          fi
          API="https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}"

          echo "==> 在 Gitee 创建发行版 ${TAG}"
          RESP=$(curl -sS -X POST "${API}/releases" \
            -H "Content-Type: application/json" \
            -d "{\"access_token\":\"${GITEE_TOKEN}\",\"tag_name\":\"${TAG}\",\"name\":\"${TAG}\",\"body\":\"deepx ${TAG} — 由 CI 自动同步自 GitHub\",\"target_commitish\":\"main\"}")
          RELEASE_ID=$(echo "$RESP" | jq -r '.id // empty')
          if [ -z "$RELEASE_ID" ]; then
            echo "创建发行版失败,响应:$RESP"; exit 1
          fi
          echo "Gitee release id = ${RELEASE_ID}"

          echo "==> 上传二进制 + checksums 到 Gitee"
          for f in dist/*.tar.gz dist/*.zip dist/checksums.txt; do
            [ -f "$f" ] || continue
            echo "  上传 $(basename "$f")"
            curl -sS -X POST "${API}/releases/${RELEASE_ID}/attach_files" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "file=@${f}" >/dev/null
          done
          echo "==> Gitee 同步完成"
